<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neon Profile Card</title>
    <link rel="stylesheet" href="./MordenProfileCard.css">
</head>

<body>

    <div class="background-glow"></div>

    <div class="profile-card">

        <div class="header">

            <!-- ORBIT -->
            <div class="orbit-container">
                <div class="orbit-ring" id="orbit"></div>
            </div>

            <!-- AVATAR -->
            <div class="avatar">
                <img src="./images/Abisankar.jpg" alt="Abisankar Photo" width="100px" height="100px">
            </div>

        </div>

        <div class="content">
            <h2 class="name">Abisankar M</h2>

            <div class="role" id="roleText">Web Developer</div>

            <p class="handle">@abisankar0045@gmail.com</p>

            <div class="social-links">
                <a class="social-icon"><img src="./images/Google.png" /></a>
                <a class="social-icon"><img src="./images/Facebook.png" /></a>
                <a class="social-icon"><img src="./images/LinkedIn.png" /></a>
                <a class="social-icon"><img src="./images/X.png" /></a>
                <a class="social-icon"><img src="./images/GitHub.png" /></a>
            </div>

            <p class="bio">Crafting brand and communication strategies, visual designs, and creative direction.</p>

            <div class="button-group">
                <button class="btn">Follow</button>
                <button class="btn">Message</button>
            </div>
        </div>
    </div>
    <script src="./MordenProfileCard.js"></script>
</body>

</html>
